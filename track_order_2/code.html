<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Track Order</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --deep-brown: #1a0f0a;
            --card-brown: #2a1b15;
            --gold: #c6a35f;
            --cream: #f2e8cf;
            --cream-muted: #d9cfb8;
        }
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c6a35f",
                        "background-dark": "#1a0f0a",
                        "surface-dark": "#2a1b15",
                        "gold": "#c6a35f",
                        "cream": "#f2e8cf",
                        "cream-muted": "#d9cfb8"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </style>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
            background-color: var(--deep-brown);
        }
        .map-overlay {
            mix-blend-mode: multiply;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

</div>
<div class="flex flex-col pt-0.5">

</div>
<div class="px-4 mb-6">

<p class="text-[var(--cream-muted)] text-sm opacity-70 max-w-[200px] mx-auto">Scan at the counter when you arrive</p>
</div>
</div>
<div class="px-4 pb-10 space-y-3">
<button class="w-full py-4 rounded-xl bg-[var(--card-brown)] border border-white/10 text-[var(--cream)] font-semibold flex items-center justify-center gap-3 hover:bg-white/5 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[var(--gold)]">call</span>

<button class="w-full py-2 text-[var(--gold)] font-medium text-sm hover:opacity-80 transition-opacity">

</div>
</div>

</body></html>
