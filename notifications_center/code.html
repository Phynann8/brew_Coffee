<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Push Notification Composer</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-x-hidden min-h-screen flex flex-col">
<!-- Top App Bar -->
<div class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-gray-200 dark:border-white/10 px-4 py-3 flex items-center justify-between">
<button class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="text-base font-medium text-gray-500 dark:text-gray-400">Cancel</span>
</button>
<h2 class="text-base font-bold text-gray-900 dark:text-white">New Notification</h2>
<button class="bg-primary hover:bg-primary/90 text-background-dark px-4 py-1.5 rounded-full text-sm font-bold shadow-lg shadow-primary/20 transition-all">
            Send
        </button>
</div>
<main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col gap-6">
<!-- Live Preview Section -->
<section class="flex flex-col gap-3">
<div class="flex items-center justify-between px-1">
<h3 class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Preview</h3>
<span class="text-xs text-primary font-medium flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">visibility</span>
                    iOS Lock Screen
                </span>
</div>
<!-- Mockup Container -->
<div class="relative overflow-hidden rounded-2xl bg-gray-900 border border-gray-800 shadow-2xl">
<!-- Wallpaper Background -->
<div class="absolute inset-0 opacity-40 bg-cover bg-center" data-alt="Abstract colorful gradient background representing a phone wallpaper" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCHUfiH01SVFm7j7qxUqp4ME8fNyN_8Xe8F-sa6WkUQ0Hft9wBrxoblVdUX36Gzh-UeF1Pt2c9XYzmdfeF_l7QJnZ4bn77YxTfQ46hOzr3RsP4nR6ZDnax-acKKz_1lvkdMvHmOrmxS8bfKv0AuRq4eu305MXj0yNIVqCOwoxOCDWP7cabuhtPBqfK5IwxCK2zZiKfWmGS5NUkzcFYyUTneNqRgY-yYIn7JIbzBo8Rg3OElTEMF4BPe3CkSsOF0goMdQoqRl1xhs6IV');">
</div>
<div class="relative z-10 p-4 min-h-[160px] flex flex-col justify-center">
<!-- Notification Card -->
<div class="backdrop-blur-xl bg-white/10 dark:bg-gray-800/60 border border-white/20 rounded-xl p-3 shadow-lg">
<div class="flex items-center gap-2 mb-2">
<div class="bg-black rounded-lg p-1">
<img class="w-4 h-4 rounded-sm object-cover" data-alt="Coffee beans icon logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPrJ88wd2wA4rgHTl5szydq-vN2Clk491-XKP9JHNWEnmwJ8U6jAuD6FOZXX4_HBg8MRDRP8ZKYVsAuRGenHKpeZzkYpZcbqAlkLTN_oq_XqGZXTdOw1UMQN9ox6Dss1KWnZ9bKMiDceplJiZTWghDYlFg9ryoWDmo0fyRv0CGMnUcaFVRFQColLN6RoJ9zaXWoJUtV167bPYXcQJdk0nANzLKx8UwzaNkNYo4K_TFyFPFZw5C0r6EStsWRwo2BbLQOt8q3Hes1a2P"/>
</div>
<span class="text-xs font-semibold text-white/90 uppercase tracking-wide">COFFEE APP</span>
<span class="text-xs text-white/60 ml-auto">now</span>
</div>
<div class="pl-0.5">
<p class="text-sm font-bold text-white mb-0.5 leading-tight">Happy Hour! ☕️</p>
<p class="text-xs text-white/90 leading-relaxed">Get 50% off your favorite latte when you order within the next hour.</p>
</div>
</div>
</div>
</div>
</section>
<!-- Form Section -->
<section class="flex flex-col gap-5">
<!-- Input Fields -->
<div class="flex flex-col gap-4">
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Title</span>
<input class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="e.g., Morning Brew Details" type="text" value="Happy Hour! ☕️"/>
<div class="flex justify-end px-1">
<span class="text-xs text-gray-400">14/40</span>
</div>
</label>
<label class="flex flex-col gap-1.5">
<span class="text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Message</span>
<textarea class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none h-28 transition-all" placeholder="Type your notification message here...">Get 50% off your favorite latte when you order within the next hour.</textarea>
<!-- Emoji Toolbar -->
<div class="flex items-center justify-between px-1">
<div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
<button class="text-lg hover:scale-125 transition-transform">☕️</button>
<button class="text-lg hover:scale-125 transition-transform">🥐</button>
<button class="text-lg hover:scale-125 transition-transform">🔥</button>
<button class="text-lg hover:scale-125 transition-transform">👋</button>
<button class="text-lg hover:scale-125 transition-transform">🎉</button>
</div>
<span class="text-xs text-gray-400">62/120</span>
</div>
</label>
</div>
<div class="h-px bg-gray-200 dark:bg-white/10 w-full"></div>
<!-- Audience Selector -->
<div class="flex flex-col gap-3">
<div class="flex items-center gap-2 ml-1">
<span class="material-symbols-outlined text-primary text-[20px]">group</span>
<span class="text-sm font-bold text-gray-700 dark:text-gray-200">Target Audience</span>
</div>
<div class="flex gap-3 overflow-x-auto pb-2 -mx-4 px-4 scrollbar-hide">
<button class="shrink-0 bg-primary text-background-dark px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-primary/10 ring-2 ring-primary ring-offset-2 ring-offset-background-dark transition-all">
                        All Users
                    </button>
<button class="shrink-0 bg-white dark:bg-white/5 hover:bg-gray-100 dark:hover:bg-white/10 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 px-4 py-2 rounded-lg text-sm font-medium transition-all">
                        Loyal Customers
                    </button>
<button class="shrink-0 bg-white dark:bg-white/5 hover:bg-gray-100 dark:hover:bg-white/10 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 px-4 py-2 rounded-lg text-sm font-medium transition-all">
                        Inactive (&gt;30 days)
                    </button>
<button class="shrink-0 bg-white dark:bg-white/5 hover:bg-gray-100 dark:hover:bg-white/10 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 px-4 py-2 rounded-lg text-sm font-medium transition-all">
                        New Signups
                    </button>
</div>
</div>
<div class="h-px bg-gray-200 dark:bg-white/10 w-full"></div>
<!-- Delivery Options -->
<div class="flex flex-col gap-3 pb-8">
<div class="flex items-center gap-2 ml-1">
<span class="material-symbols-outlined text-primary text-[20px]">schedule_send</span>
<span class="text-sm font-bold text-gray-700 dark:text-gray-200">Delivery</span>
</div>
<div class="bg-gray-100 dark:bg-white/5 p-1 rounded-xl flex">
<button class="flex-1 bg-white dark:bg-white/10 text-gray-900 dark:text-white shadow-sm rounded-lg py-2 text-sm font-bold transition-all flex items-center justify-center gap-2">
                        Send Now
                    </button>
<button class="flex-1 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white py-2 text-sm font-medium transition-all flex items-center justify-center gap-2">
                        Schedule
                    </button>
</div>
<!-- Helper text for 'Send Now' -->
<p class="text-xs text-gray-500 dark:text-gray-400 px-1">
                    Notification will be sent immediately to approx <span class="text-primary font-bold">1,240</span> users.
                </p>
</div>
</section>
</main>
</body></html>
